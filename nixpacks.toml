[phases.setup]
nixPkgs = ["python311", "nodejs", "chromium", "glib", "nss", "nspr", "atk", "at-spi2-atk", "libdrm", "expat", "libxcb", "libxkbcommon", "mesa", "alsa-lib", "pango", "cairo", "at-spi2-core", "cups", "gtk3"]

[variables]
PLAYWRIGHT_BROWSERS_PATH = "/app/.cache/ms-playwright"

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium --with-deps"]

[start]
cmd = "bash start.sh"
